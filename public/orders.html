<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f8f9fa; }
    .navbar { background: #212529 !important; }
    .card { border: none; border-radius: 15px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
    .price { color: #28a745; font-weight: bold; font-size: 20px; }
    .order-id { color: #6c757d; font-size: 14px; }
    .item-row { border-bottom: 1px solid #eee; padding: 8px 0; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark navbar-expand-lg mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4" href="/">🛍️ Mini Shop</a>
      <a href="/" class="btn btn-outline-light">← Back to Shop</a>
    </div>
  </nav>

  <div class="container">
    <h2 class="fw-bold mb-4">📦 My Orders</h2>
    <div id="orders">
      <div class="text-center mt-5">
        <div class="spinner-border" role="status"></div>
        <p class="mt-2 text-muted">Loading orders...</p>
      </div>
    </div>
  </div>

  <script>
    const name = localStorage.getItem('name');

    if (!name) {
      alert('Please login first!');
      window.location = '/login.html';
    }

    fetch('http://localhost:5000/api/orders')
      .then(res => res.json())
      .then(orders => {
        const container = document.getElementById('orders');
        container.innerHTML = '';

        const myOrders = orders.filter(o => o.name === name);

        if (myOrders.length === 0) {
          container.innerHTML = `
            <div class="text-center mt-5">
              <p style="font-size:60px">📦</p>
              <h4 class="text-muted">No orders yet!</h4>
              <a href="/" class="btn btn-dark mt-3">Start Shopping</a>
            </div>
          `;
          return;
        }

        myOrders.reverse().forEach(order => {
          container.innerHTML += `
            <div class="card mb-4">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <div>
                    <h5 class="fw-bold mb-0">Order #${order._id.slice(-6).toUpperCase()}</h5>
                    <span class="order-id">${new Date(order.date).toLocaleDateString('en-IN', { 
                      year: 'numeric', month: 'long', day: 'numeric' 
                    })}</span>
                  </div>
                  <span class="badge bg-success fs-6">✅ Confirmed</span>
                </div>
                <div class="mb-3">
                  ${order.items.map(item => `
                    <div class="item-row d-flex justify-content-between">
                      <span>👟 ${item.name}</span>
                      <span class="text-muted">₹${item.price}</span>
                    </div>
                  `).join('')}
                </div>
                <div class="d-flex justify-content-between align-items-center">
                  <span class="text-muted">${order.items.length} item(s)</span>
                  <span class="price">Total: ₹${order.total}</span>
                </div>
              </div>
            </div>
          `;
        });
      });
  </script>

</body>
</html>
