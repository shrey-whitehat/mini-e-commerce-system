<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f8f9fa; }
    .navbar { background: #212529 !important; }
    .card { border: none; border-radius: 15px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
    .price { color: #28a745; font-weight: bold; font-size: 20px; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark navbar-expand-lg mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4" href="/">🛍️ Mini Shop</a>
      <a href="/" class="btn btn-outline-light">← Back to Shop</a>
    </div>
  </nav>

  <div class="container">
    <h2 class="fw-bold mb-4">🛒 My Cart</h2>
    <div id="cart-items"></div>
    <div id="total" class="text-end fs-4 fw-bold mt-3"></div>
    <div id="checkout" class="mt-3"></div>
  </div>

  <script>
    function renderCart() {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      const container = document.getElementById('cart-items');
      const totalDiv = document.getElementById('total');
      const checkoutDiv = document.getElementById('checkout');
      container.innerHTML = '';

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="text-center mt-5">
            <p style="font-size:60px">🛒</p>
            <h4 class="text-muted">Your cart is empty!</h4>
            <a href="/" class="btn btn-dark mt-3">Continue Shopping</a>
          </div>
        `;
        totalDiv.innerHTML = '';
        checkoutDiv.innerHTML = '';
        return;
      }

      let total = 0;
      cart.forEach((item, index) => {
        total += item.price;
        container.innerHTML += `
          <div class="card mb-3">
            <div class="card-body d-flex justify-content-between align-items-center">
              <div class="d-flex align-items-center gap-3">
                <div style="font-size:40px">👟</div>
                <div>
                  <h5 class="mb-0 fw-bold">${item.name}</h5>
                  <p class="text-muted mb-0">${item.description}</p>
                </div>
              </div>
              <div class="text-end">
                <p class="price mb-2">₹${item.price}</p>
                <button class="btn btn-danger btn-sm" onclick="removeItem(${index})">Remove</button>
              </div>
            </div>
          </div>
        `;
      });

      totalDiv.innerHTML = `Total: <span class="text-success">₹${total}</span>`;
      checkoutDiv.innerHTML = `
        <button class="btn btn-success btn-lg w-100" onclick="placeOrder(${total})">
          Place Order ₹${total} 🎉
        </button>
      `;
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
    }

    async function placeOrder(total) {
      const name = localStorage.getItem('name');
      if (!name) {
        alert('Please login first!');
        window.location = '/login.html';
        return;
      }
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      const res = await fetch('http://localhost:5000/api/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, items: cart, total })
      });
      const data = await res.json();
      alert(data.message);
      localStorage.removeItem('cart');
      window.location = '/orders.html';
    }

    renderCart();
  </script>

</body>
</html>
